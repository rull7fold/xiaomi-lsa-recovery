name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile recover_lsa.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: recover_lsa_exe
        path: dist/recover_lsa.exe
